version: '3.9'

services:
  # ─── MySQL ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eduvideo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eduvideo}
      MYSQL_USER: ${MYSQL_USER:-eduvideo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eduvideo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-root_password}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduvideo-net

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduvideo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduvideo-net

  # ─── MinIO (S3-compatible local storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: eduvideo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - eduvideo-net

  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduvideo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-eduvideo}:${MYSQL_PASSWORD:-eduvideo_password}@mysql:3306/${MYSQL_DATABASE:-eduvideo}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-eduvideo}
      AWS_ENDPOINT: http://minio:9000
      STORAGE_BASE_URL: http://localhost:9000/eduvideo
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DID_API_KEY: ${DID_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOCAL_STORAGE_PATH: /app/uploads
      FFMPEG_TEMP_DIR: /tmp/edu-video
    ports:
      - '3001:3001'
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduvideo-net

  # ─── Worker ────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: eduvideo-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-eduvideo}:${MYSQL_PASSWORD:-eduvideo_password}@mysql:3306/${MYSQL_DATABASE:-eduvideo}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-eduvideo}
      AWS_ENDPOINT: http://minio:9000
      STORAGE_BASE_URL: http://localhost:9000/eduvideo
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DID_API_KEY: ${DID_API_KEY:-}
      FFMPEG_PATH: ffmpeg
      FFMPEG_TEMP_DIR: /tmp/edu-video
      LOCAL_STORAGE_PATH: /app/uploads
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduvideo-net

  # ─── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    container_name: eduvideo-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - eduvideo-net

volumes:
  mysql_data:
  redis_data:
  minio_data:
  uploads:

networks:
  eduvideo-net:
    driver: bridge
